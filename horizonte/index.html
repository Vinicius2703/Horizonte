<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Horizonte</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <nav>
            <a href="#Home"><img src="../../assets/Horizonte_branco.svg" alt="Logo Horizonte"></a>
            
            <div class="nav_bar">
                <div class="botoes_nav">
                    <a href="#inicio">Início</a>
                    <a href="#destinos">Destinos</a>
                    <a href="#pacotes">Pacotes</a>
                </div>
                
                <div class="log_cad">
                    <a href="#login">Login</a>
                    <a href="#cadastro" class="cadastro">Cadastre-se</a>
                </div>
            </div>
        </nav>
    </header>
    <main>
        <section id="inicio" class="hero">
            <div class="hero-conteudo"></div>

            <div class="barra">
                    <div class="item-barra">
                        <details class="dropdown">
                            <summary>DESTINO <img src="../../assets/seta-dropdown.svg" alt="seta" class="setinha"></summary>
                            <div class="dropdown-conteudo">
                                <p>Internacionais</p>
                                <p>Nacionais</p>
                            </div>
                        </details>
                        <p class="descricao">Para onde você quer ir?</p>
                    </div>

                    <div class="item-barra">
                        <details class="dropdown">
                            <summary>DATA <img src="../../assets/seta-dropdown.svg" alt="seta" class="setinha"></summary>
                            <div class="dropdown-conteudo">
                                <input type="date">
                            </div>
                        </details>
                        <p class="descricao">Quando você quer ir?</p>
                    </div>

                    <div class="item-barra">
                        <details class="dropdown">
                            <summary>PESSOAS <img src="../../assets/seta-dropdown.svg" alt="seta" class="setinha"></summary>
                            <div class="dropdown-conteudo">
                                <p>1 Pessoa</p>
                                <p>2 Pessoas</p>
                                <p>3+ Pessoas</p>
                            </div>
                        </details>
                        <p class="descricao">Para onde você quer ir?</p>
                    </div>

            </div>
        </section>
    </main>
</body>
</html>
